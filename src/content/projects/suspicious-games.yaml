        alt: Screenshot of a digital whiteboard filled with content.
        caption: I extensively used miro to create flowcharts and diagrams as well as collect visual information. I also used it to prototype level layouts and iterate on the card decks.
      - src: /media/projects/suspicious-games/65ce38189be9a5b998b5e0cb-turnui.png
